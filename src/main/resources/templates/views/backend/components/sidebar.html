<component th:fragment="sidebar" xmlns:th="http://www.thymeleaf.org">

    <!--start sidebar-->
    <div id="sidebar" class='active'>
        <div class="sidebar-wrapper active">
            <div class="sidebar-header" style="display: flex; justify-content: center; align-items: center;">
                <img src="/assets/images/avatar/batman_hero.png" alt="" srcset="" style="width: 100px; height: 100px;">
            </div>

            <div class="sidebar-menu">
                <ul class="menu">
                    <li class='sidebar-title'>Main Menu</li>

                    <!--dashboard-->
                    <li class="sidebar-item" th:classappend="${activePage == 'dashboard'} ? ' active' : ''">
                        <a href="dashboard" class='sidebar-link'>
                            <i data-feather="home" width="20"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>

                    <!--membership-->
                    <li class="sidebar-item" th:classappend="${activePage == 'events'} ? ' active' : ''">
                        <a href="/events" class='sidebar-link'>
                            <i data-feather="user-plus" width="20"></i>
                            <span>Events</span>
                        </a>
                    </li>

                    <!--publisher-->
                    <li class="sidebar-item" th:classappend="${activePage == 'eventRegistration'} ? ' active' : ''">
                        <a href="/eventRegistration" class='sidebar-link'>
                            <i data-feather="user" width="20"></i>
                            <span>Event Registration</span>
                        </a>
                    </li>

                    <!--books-->
                    <li class="sidebar-item" th:classappend="${activePage == 'sponsors'} ? ' active' : ''">
                        <a href="/sponsors" class='sidebar-link'>
                            <i data-feather="book" width="20"></i>
                            <span>Sponsors</span>
                        </a>
                    </li>

                    <!--categories-->
                    <li class="sidebar-item" th:classappend="${activePage == 'feedback'} ? ' active' : ''">
                        <a href="/feedback" class='sidebar-link'>
                            <i data-feather="briefcase" width="20"></i>
                            <span>Feedback</span>
                        </a>
                    </li>

                    <!--author-->
                    <li class="sidebar-item" th:classappend="${activePage == 'payments'} ? ' active' : ''">
                        <a href="/payments" class='sidebar-link'>
                            <i data-feather="money" width="20"></i>
                            <span>Payments</span>
                        </a>
                    </li>


                    <!--reservation-->
                    <li class="sidebar-item " th:classappend="${activePage == 'tickets'} ? ' active' : ''">
                        <a href="/tickets" class='sidebar-link'>
                            <i data-feather="plus-square" width="20"></i>
                            <span>Tickets</span>
                        </a>
                    </li>

                    <li class='sidebar-title'>Pages</li>
                    <li class="sidebar-item  has-sub">
                        <a href="#" class='sidebar-link'>
                            <i data-feather="user" width="20"></i>
                            <span>Authentication</span>
                        </a>
                        <ul class="submenu">
                            <li th:classappend="${activePage == 'auth-login'} ? ' active' : ''">
                                <a href="auth-login">Login</a>
                            </li>
                            <li th:classappend="${activePage == 'auth-register'} ? ' active' : ''">
                                <a href="auth-register">Register</a>
                            </li>
                            <li th:classappend="${activePage == 'auth-forgot-password'} ? ' active' : ''">
                                <a href="auth-forgot-password">Forgot Password</a>
                            </li>
                        </ul>
                    </li>


                    <li class="sidebar-item  has-sub">
                        <a href="#" class='sidebar-link'>
                            <i data-feather="alert-circle" width="20"></i>
                            <span>Errors</span>
                        </a>
                        <ul class="submenu ">
                            <li>
                                <a href="./pages/error-403">403</a>
                            </li>
                            <li>
                                <a href="./pages/error-404">404</a>
                            </li>
                            <li>
                                <a href="./pages/error-500">500</a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
            <button class="sidebar-toggler btn x"><i data-feather="x"></i></button>
        </div>
    </div>
    <!--end sidebar-->

</component>
